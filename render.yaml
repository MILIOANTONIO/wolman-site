services:
  - type: web
    name: wolman-site
    runtime: python
    plan: free
    rootDir: wolman-site
    buildCommand: "pip install -r server/requirements.txt"
    startCommand: "python server/chat_server.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ELEVENLABS_WEBHOOK_SECRET
        sync: false
